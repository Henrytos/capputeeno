services:
  postgres:
    image: postgres:16-alpine
    container_name: capputeeno_product_postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - capputeeno_product_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:8.0.6-alpine3.21
    container_name: capputeeno_product_redis
    ports:
      - "6379:6379"
    volumes:
      - capputeeno_product_redisdata:/data
    command: [ "redis-server", "--appendonly", "yes" ]

volumes:
  capputeeno_product_pgdata:
  capputeeno_product_redisdata: